#:schema node_modules/wrangler/config-schema.json
# Deploy (production):
# 1. npm ci && npm run build
# 2. wrangler d1 create student-planner-lite-db  → copy database_id into [[d1_databases]] below
# 3. wrangler d1 execute student-planner-lite-db --remote --file=schema.sql
# 4. In Google Cloud Console, add the Workers URL to OAuth "Authorized JavaScript origins" (and redirect URIs if used).
# 5. wrangler deploy
name = "student-planner-lite"
main = "src/worker.js"
compatibility_date = "2024-04-03"

[vars]
# Must match Google OAuth client ID (Login.jsx) and token audience check in worker.
GOOGLE_CLIENT_ID = "365692313483-g4tv5i5agl4egs67h980vn6ce977p7df.apps.googleusercontent.com"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "student-planner-lite-db"
database_id = "6f622e2e-8fb1-4a10-9701-7ed689100500"
