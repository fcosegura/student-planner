#:schema node_modules/wrangler/config-schema.json
# Deploy (production):
# 1. npm ci && npm run build
# 2. Si este repo es un fork: `npx wrangler login` y `npx wrangler d1 create student-planner-lite-db`
#    Copia el UUID nuevo en database_id abajo (el ID del repo no es tu base en tu cuenta).
# 3. Esquema D1: `npm run db:migrate:remote` (usa ./migrations). No uses la consola SQL del dashboard
#    para pegar todo el esquema de golpe: suele aceptar solo una sentencia por ejecución.
#    Alternativa: `npx wrangler d1 execute student-planner-lite-db --remote --file=migrations/0001_initial.sql`
# 4. Google Cloud Console: añade la URL del Worker a OAuth "Authorized JavaScript origins" (y redirect URIs si aplica).
# 5. wrangler deploy
name = "student-planner"
main = "src/worker.js"
compatibility_date = "2024-04-03"

# Run before deploy so `[assets].directory` (./dist) exists in CI (Workers Builds / wrangler deploy).
[build]
command = "npm run build"

[vars]
# Must match Google OAuth client ID (Login.jsx) and token audience check in worker.
GOOGLE_CLIENT_ID = "365692313483-g4tv5i5agl4egs67h980vn6ce977p7df.apps.googleusercontent.com"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "student-planner-lite-db"
database_id = "6f622e2e-8fb1-4a10-9701-7ed689100500"
migrations_dir = "migrations"
